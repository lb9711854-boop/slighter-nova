
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  #nova-app{
    background: #0a0a1a;
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 8px;
    font-family: 'Orbitron', monospace;
    color: #fff;
  }
  #nova-title{
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #ff6ec7, #a78bfa, #38bdf8, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-align:center;
  }
  #stats-bar{
    display: flex;
    gap: 18px;
    margin-bottom: 10px;
  }
  .stat-box{
    background: #1a1a2e;
    border: 1px solid #7c3aed55;
    border-radius: 8px;
    padding: 4px 14px;
    text-align: center;
    min-width: 80px;
  }
  .stat-label{
    font-size: 9px;
    color: #a78bfa;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .stat-val{
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  #canvas-wrap{
    position: relative;
    border: 2px solid #7c3aed;
    border-radius: 10px;
    box-shadow: 0 0 30px #7c3aed55, 0 0 8px #38bdf855;
    overflow: hidden;
  }
  #gc{display:block;background:#0a0a1a;}
  #overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background: rgba(10,10,26,0.88);
    border-radius:8px;
    gap:12px;
  }
  #overlay h2{
    font-size:18px;font-weight:900;letter-spacing:3px;
    background: linear-gradient(90deg,#ff6ec7,#a78bfa,#38bdf8);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    text-align:center;
  }
  #overlay p{font-size:11px;color:#94a3b8;letter-spacing:1px;text-align:center;padding:0 20px;}
  #btn-start{
    background: linear-gradient(135deg,#7c3aed,#38bdf8);
    border:none;border-radius:8px;
    padding:10px 32px;
    font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;
    color:#fff;cursor:pointer;
    box-shadow:0 2px 16px #7c3aed66;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #btn-start:hover{transform:scale(1.05);box-shadow:0 4px 24px #7c3aed99;}
  #hi-score{font-size:10px;color:#64748b;letter-spacing:1px;}
  #controls-hint{
    margin-top:8px;
    display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap;
  }
  .key{
    background:#1e1b4b;border:1px solid #7c3aed55;border-radius:5px;
    padding:3px 8px;font-size:10px;color:#a78bfa;letter-spacing:1px;
  }
  #d-pad{
    display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(2,40px);
    gap:4px;margin-top:8px;
  }
  .dp-btn{
    background:#1a1a2e;border:1px solid #7c3aed55;border-radius:8px;
    color:#a78bfa;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    user-select:none;-webkit-user-select:none;
    transition:background 0.1s;
  }
  .dp-btn:active{background:#7c3aed44;}
  #lvl-bar-wrap{
    width:100%;max-width:340px;margin-top:6px;
    background:#1a1a2e;border-radius:4px;overflow:hidden;height:5px;
    border:1px solid #7c3aed33;
  }
  #lvl-bar{height:5px;background:linear-gradient(90deg,#a78bfa,#38bdf8);width:0%;transition:width 0.3s;}
</style>

<div id="nova-app">
  <div id="nova-title">✦ SLITHER NOVA ✦</div>
  <div id="stats-bar">
    <div class="stat-box"><div class="stat-label">Score</div><div class="stat-val" id="s-score">0</div></div>
    <div class="stat-box"><div class="stat-label">Level</div><div class="stat-val" id="s-level">1</div></div>
    <div class="stat-box"><div class="stat-label">High</div><div class="stat-val" id="s-hi">0</div></div>
    <div class="stat-box"><div class="stat-label">Lives</div><div class="stat-val" id="s-lives">♥♥♥</div></div>
  </div>
  <div id="lvl-bar-wrap"><div id="lvl-bar"></div></div>
  <br>
  <div id="canvas-wrap">
    <canvas id="gc" width="340" height="340"></canvas>
    <div id="overlay">
      <h2>SLITHER NOVA</h2>
      <p>Eat the glowing orbs. Avoid walls & yourself.<br>Speed increases with each level!</p>
      <button id="btn-start">▶ START GAME</button>
      <div id="hi-score">HIGH SCORE: <span id="ov-hi">0</span></div>
    </div>
  </div>
  <div id="controls-hint">
    <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
    <span style="font-size:10px;color:#64748b;margin-left:4px;">or tap below</span>
  </div>
  <div id="d-pad">
    <div></div>
    <div class="dp-btn" id="dp-up">▲</div>
    <div></div>
    <div class="dp-btn" id="dp-left">◀</div>
    <div class="dp-btn" id="dp-down">▼</div>
    <div class="dp-btn" id="dp-right">▶</div>
  </div>
</div>

<script>
(function(){
  const COLS=17,ROWS=17,CELL=20;
  let snake,dir,nextDir,food,bonus,bonusTimer,score,hiScore,level,lives,running,loop,particles,frame;
  const COLORS={
    snake:['#34d399','#a78bfa','#38bdf8','#fb923c','#f472b6'],
    food:['#ff6ec7','#facc15','#f87171','#34d399','#38bdf8'],
    bonus:'#facc15',
    bg:'#0a0a1a',
    grid:'#1a1a2e'
  };
  const canvas=document.getElementById('gc');
  const ctx=canvas.getContext('2d');
  const overlay=document.getElementById('overlay');
  const btnStart=document.getElementById('btn-start');
  const elScore=document.getElementById('s-score');
  const elLevel=document.getElementById('s-level');
  const elHi=document.getElementById('s-hi');
  const elLives=document.getElementById('s-lives');
  const elOvHi=document.getElementById('ov-hi');
  const elLvlBar=document.getElementById('lvl-bar');

  hiScore=0;
  function getSpeed(){return Math.max(95,260-(level-1)*18);}
  function rand(n){return Math.floor(Math.random()*n);}

  function initGame(){
    snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];
    dir={x:1,y:0};nextDir={x:1,y:0};
    particles=[];frame=0;
    score=0;level=1;lives=3;
    placeFood();bonus=null;bonusTimer=0;
    updateUI();
  }

  function placeFood(){
    let pos;
    do{pos={x:rand(COLS),y:rand(ROWS)};}
    while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
    food={...pos,color:COLORS.food[rand(COLORS.food.length)],pulse:0};
  }

  function placeBonus(){
    let pos;
    do{pos={x:rand(COLS),y:rand(ROWS)};}
    while(snake.some(s=>s.x===pos.x&&s.y===pos.y)||(food&&pos.x===food.x&&pos.y===food.y));
    bonus={...pos,color:COLORS.bonus,pulse:0};
    bonusTimer=80;
  }

  function updateUI(){
    elScore.textContent=score;
    elLevel.textContent=level;
    elHi.textContent=hiScore;
    elOvHi.textContent=hiScore;
    let h='';
    for(let i=0;i<lives;i++)h+='♥';
    for(let i=lives;i<3;i++)h+='♡';
    elLives.textContent=h;
    let pct=Math.min(100,((score%(level*10))/((level)*10))*100);
    elLvlBar.style.width=pct+'%';
  }

  function step(){
    if(!running)return;
    frame++;
    dir={...nextDir};
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
      lives--;
      if(lives<=0){endGame();return;}
      burst(snake[0].x,snake[0].y,'#f87171',12);
      snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];
      dir={x:1,y:0};nextDir={x:1,y:0};
      updateUI();return;
    }
    snake.unshift(head);
    let ate=false;
    if(head.x===food.x&&head.y===food.y){
      score+=level;ate=true;
      burst(food.x,food.y,food.color,8);
      placeFood();
      if(score>=level*10){level++;clearInterval(loop);loop=setInterval(step,getSpeed());}
      if(frame%12===0&&!bonus)placeBonus();
      updateUI();
    }
    if(bonus&&head.x===bonus.x&&head.y===bonus.y){
      score+=level*3;ate=true;
      burst(bonus.x,bonus.y,COLORS.bonus,14);
      bonus=null;updateUI();
    }
    if(!ate)snake.pop();
    if(bonus){bonusTimer--;if(bonusTimer<=0)bonus=null;}
    tickParticles();
    draw();
  }

  function burst(gx,gy,color,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,sp=1+Math.random()*2.5;
      particles.push({x:gx*CELL+CELL/2,y:gy*CELL+CELL/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color});
    }
  }

  function tickParticles(){
    for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.life-=0.06;}
    particles=particles.filter(p=>p.life>0);
  }

  function draw(){
    ctx.fillStyle=COLORS.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      ctx.fillStyle=COLORS.grid;ctx.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
    }
    if(food){
      food.pulse=(food.pulse||0)+0.12;
      const sc=1+0.12*Math.sin(food.pulse);
      const cx=food.x*CELL+CELL/2,cy=food.y*CELL+CELL/2;
      ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
      ctx.shadowColor=food.color;ctx.shadowBlur=12;
      ctx.beginPath();ctx.arc(0,0,CELL/2-2,0,Math.PI*2);
      ctx.fillStyle=food.color;ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    }
    if(bonus){
      bonus.pulse=(bonus.pulse||0)+0.18;
      const sc=1+0.18*Math.sin(bonus.pulse);
      const cx=bonus.x*CELL+CELL/2,cy=bonus.y*CELL+CELL/2;
      ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
      ctx.shadowColor=COLORS.bonus;ctx.shadowBlur=16;
      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a=i*Math.PI*2/5-Math.PI/2;
        const b=a+Math.PI/5;
        ctx.lineTo(Math.cos(a)*8,Math.sin(a)*8);
        ctx.lineTo(Math.cos(b)*4,Math.sin(b)*4);
      }
      ctx.closePath();ctx.fillStyle=COLORS.bonus;ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    }
    snake.forEach((seg,i)=>{
      const t=i/snake.length;
      const colors=COLORS.snake;
      const ci=Math.floor(t*(colors.length-1));
      const color=colors[Math.min(ci,colors.length-1)];
      const r=i===0?CELL/2-1:CELL/2-2;
      ctx.shadowColor=color;ctx.shadowBlur=i===0?10:5;
      ctx.beginPath();ctx.arc(seg.x*CELL+CELL/2,seg.y*CELL+CELL/2,r,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
      ctx.shadowBlur=0;
    });
    for(let p of particles){
      ctx.globalAlpha=p.life;
      ctx.beginPath();ctx.arc(p.x,p.y,3*p.life,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  function endGame(){
    running=false;clearInterval(loop);
    if(score>hiScore)hiScore=score;
    overlay.style.display='flex';
    overlay.querySelector('h2').textContent='GAME OVER';
    overlay.querySelector('p').textContent='Score: '+score+'  |  Level: '+level;
    btnStart.textContent='▶ PLAY AGAIN';
    elOvHi.textContent=hiScore;
    elHi.textContent=hiScore;
  }

  btnStart.addEventListener('click',()=>{
    overlay.style.display='none';
    overlay.querySelector('h2').textContent='SLITHER NOVA';
    overlay.querySelector('p').textContent='Eat the glowing orbs. Avoid walls & yourself.\nSpeed increases with each level!';
    btnStart.textContent='▶ START GAME';
    initGame();running=true;
    clearInterval(loop);loop=setInterval(step,getSpeed());
  });

  document.addEventListener('keydown',e=>{
    if(!running)return;
    if(e.key==='ArrowUp'&&dir.y!==1)nextDir={x:0,y:-1};
    else if(e.key==='ArrowDown'&&dir.y!==-1)nextDir={x:0,y:1};
    else if(e.key==='ArrowLeft'&&dir.x!==1)nextDir={x:-1,y:0};
    else if(e.key==='ArrowRight'&&dir.x!==-1)nextDir={x:1,y:0};
  });

  function dpad(dx,dy){
    if(!running)return;
    if(dx===0&&dy===-1&&dir.y!==1)nextDir={x:0,y:-1};
    else if(dx===0&&dy===1&&dir.y!==-1)nextDir={x:0,y:1};
    else if(dx===-1&&dy===0&&dir.x!==1)nextDir={x:-1,y:0};
    else if(dx===1&&dy===0&&dir.x!==-1)nextDir={x:1,y:0};
  }

  document.getElementById('dp-up').addEventListener('click',()=>dpad(0,-1));
  document.getElementById('dp-down').addEventListener('click',()=>dpad(0,1));
  document.getElementById('dp-left').addEventListener('click',()=>dpad(-1,0));
  document.getElementById('dp-right').addEventListener('click',()=>dpad(1,0));

  draw();
})();
</script>
